[project]
name = "ft-agent"
version = "0.1.0"
description = "A minimal agent project using DeepSeek via the OpenAI SDK."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "openai>=1.88.0",
    "python-dotenv>=1.0.1",
]

[project.scripts]
ft-agent-check = "ft_agent.util.check_deepseek:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
